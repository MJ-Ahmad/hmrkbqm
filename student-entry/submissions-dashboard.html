<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Submissions Dashboard - Baitul Quran International Madrasha</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="scripts/dashboard.js" defer></script>
</head>
<body>
  <header>
    <h1>Submissions Dashboard</h1>
    <p>Review all student entries submitted by teachers</p>
  </header>

  <main>
    <div class="filters">
      <label for="teacherFilter">Teacher:</label>
      <select id="teacherFilter">
        <option value="all">All</option>
      </select>

      <label for="residentialFilter">Residential Status:</label>
      <select id="residentialFilter">
        <option value="all">All</option>
        <option value="Residential">Residential</option>
        <option value="Non-Residential">Non-Residential</option>
      </select>

      <label for="searchName">Search Student:</label>
      <input type="text" id="searchName" placeholder="Enter student name">

      <button onclick="applyFilters()">Apply Filters</button>
    </div>

    <table id="submissionsTable">
      <thead>
        <tr>
          <th>Teacher</th>
          <th>Student Name</th>
          <th>Address</th>
          <th>Age</th>
          <th>Progress</th>
          <th>Residential</th>
          <th>Photo</th>
          <th>Submitted At</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <footer>
    <p>© 2026 Baitul Quran International Madrasha | Submissions Dashboard</p>
  </footer>
</body>
</html>
